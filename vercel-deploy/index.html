<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRBP - TNA_AI Application</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --zalo-blue: #0068FF; --zalo-blue-dark: #0052CC; --zalo-blue-deep: #0A2F6B;
    --zalo-cyan: #00C2FF; --zalo-mint: #17D8C4; --zalo-coral: #FF6B6B; --zalo-amber: #FFB800;
    --ink: #0A2540; --ink-soft: #4A5B78; --line: #E3ECFB; --card: #FFFFFF;
    --bg-1: #EAF3FF; --bg-2: #F6FBFF; --radius-lg: 24px; --radius-md: 16px;
    --shadow-soft: 0 8px 24px rgba(0,104,255,0.10); --shadow-card: 0 4px 16px rgba(10,37,64,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Roboto', Arial, sans-serif; color:var(--ink); min-height:100vh;
    background:
      radial-gradient(1200px 600px at 90% -10%, rgba(0,194,255,0.18), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(23,216,196,0.14), transparent 55%),
      linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  h1{font-family:'Nunito','Roboto',Arial,sans-serif; margin:0; color:#fff;}
  .card{
    max-width:640px; width:100%; border-radius:var(--radius-lg);
    background:linear-gradient(135deg, var(--zalo-blue) 0%, #1E8CFF 45%, var(--zalo-cyan) 100%);
    color:#fff; padding:44px 36px; box-shadow:var(--shadow-soft); position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; right:-60px; top:-80px; width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
  }
  .badge{
    display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,0.18);
    border:1px solid rgba(255,255,255,0.35); padding:6px 14px; border-radius:999px;
    font-size:12.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; margin-bottom:18px;
    position:relative; z-index:1;
  }
  .title{font-size:26px; font-weight:900; line-height:1.3; position:relative; z-index:1;}
  .desc{margin-top:14px; font-size:14.5px; line-height:1.6; color:#F0FAFF; position:relative; z-index:1;}
  .links{ display:flex; flex-direction:column; gap:12px; margin-top:28px; position:relative; z-index:1; }
  .links a{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.3);
    border-radius:14px; padding:16px 20px; color:#fff; text-decoration:none;
    font-weight:700; font-size:14.5px; transition:background .15s ease, transform .15s ease;
  }
  .links a:hover{ background:rgba(255,255,255,0.24); transform:translateX(2px); }
  .links a .arrow{opacity:.8;}
</style>
</head>
<body>
  <div class="card">
    <span class="badge">📋 TNA Survey · HRBP Team</span>
    <div class="title">HRBP – TNA AI Application</div>
    <div class="desc">Khảo sát nhu cầu đào tạo (TNA) cho chuỗi workshop “AI Application” dành cho HRBP Team. Chọn một mục bên dưới để bắt đầu.</div>
    <div class="links">
      <a href="survey-vi.html">📋 Điền khảo sát (Tiếng Việt) <span class="arrow">→</span></a>
      <a href="survey-en.html">📋 Take the survey (English) <span class="arrow">→</span></a>
      <a href="results.html">📊 Xem kết quả trực tiếp <span class="arrow">→</span></a>
    </div>
  </div>
</body>
</html>
